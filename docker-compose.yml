version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: creative-pg
    environment:
      POSTGRES_USER: creative
      POSTGRES_PASSWORD: creative
      POSTGRES_DB: creative_video
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    container_name: creative-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/creative-input;
      mc mb --ignore-existing local/creative-output;
      mc mb --ignore-existing local/creative-temp;
      echo 'Buckets created';
      "

volumes:
  pg_data:
  minio_data:
