spring:
  application:
    name: creative-video-platform

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/creative_video}
    username: ${DB_USERNAME:creative}
    password: ${DB_PASSWORD:creative}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yml
    enabled: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

server:
  port: 8080
  shutdown: graceful

app:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-in-production-must-be-at-least-256-bits-long}
    access-token-expiry-ms: ${JWT_ACCESS_EXPIRY_MS:900000}       # 15 minutes
    refresh-token-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:604800000}  # 7 days

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
    allowed-headers: "*"
    max-age: 3600

  storage:
    type: ${STORAGE_TYPE:s3}
    bucket:
      input: ${STORAGE_INPUT_BUCKET:creative-input}
      output: ${STORAGE_OUTPUT_BUCKET:creative-output}
      temp: ${STORAGE_TEMP_BUCKET:creative-temp}
    presigned-url-expiry-seconds: ${STORAGE_PRESIGNED_URL_EXPIRY:3600}
    region: ${AWS_REGION:us-east-1}
    endpoint: ${STORAGE_ENDPOINT:}  # Override for MinIO / local

  metadata:
    supported-languages:
      - code: en
        name: English
      - code: es
        name: Spanish
      - code: fr
        name: French
      - code: de
        name: German
      - code: pt
        name: Portuguese
      - code: it
        name: Italian
      - code: ja
        name: Japanese
      - code: zh
        name: Chinese (Simplified)
      - code: ko
        name: Korean
      - code: ar
        name: Arabic

    supported-aspect-ratios:
      - value: "16:9"
        width: 1920
        height: 1080
      - value: "9:16"
        width: 1080
        height: 1920
      - value: "1:1"
        width: 1080
        height: 1080
      - value: "4:5"
        width: 1080
        height: 1350

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.company.creative: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

---
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/creative_video_dev
    username: creative
    password: creative

  jpa:
    show-sql: true

logging:
  level:
    com.company.creative: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod

  jpa:
    show-sql: false

logging:
  level:
    com.company.creative: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
